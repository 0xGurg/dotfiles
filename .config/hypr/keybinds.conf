# Hyprland Keybinds
# Modifier = Alt  (matches aerospace muscle memory)
# Super = Logo/Windows key (for Hyprland-specific operations)

$mainMod = ALT

# --- WINDOW FOCUS (aerospace: alt-h/j/k/l) ---
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# --- MOVE WINDOW (aerospace: alt-shift-h/j/k/l) ---
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r

# --- WORKSPACES (aerospace: alt-1..5) ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# --- MOVE TO WORKSPACE (aerospace: alt-shift-1..5) ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# --- RESIZE (aerospace: alt-shift-minus/equal) ---
bind = $mainMod SHIFT, minus, resizeactive, -50 0
bind = $mainMod SHIFT, equal, resizeactive, 50 0
bind = $mainMod CONTROL, minus, resizeactive, 0 -50
bind = $mainMod CONTROL, equal, resizeactive, 0 50

# --- FULLSCREEN / FLOAT ---
bind = $mainMod, f, fullscreen, 0       # toggle fullscreen (aerospace: alt-ctrl-shift-f)
bind = $mainMod CONTROL, f, togglefloating # toggle float (aerospace: alt-ctrl-f)

# --- WORKSPACE NAVIGATION ---
bind = $mainMod, Tab, workspace, previous
bind = $mainMod SHIFT, Tab, workspace, previous

# --- WINDOW MANAGEMENT ---
bind = $mainMod, Q, killactive,          # close window
bind = $mainMod, V, togglefloating,      # toggle float with alt-v
bind = $mainMod, P, pseudo,              # dwindle pseudotile
bind = $mainMod, O, togglesplit,         # toggle split orientation

# --- SPAWN TERMINAL ---
bind = $mainMod, Return, exec, ghostty

# --- SPAWN LAUNCHER (quickshell placeholder) ---
bind = $mainMod, space, exec, pkill -USR1 quickshell || quickshell

# --- SUPER KEYBINDS (Hyprland-native) ---
bind = SUPER, Return, exec, ghostty
bind = SUPER, Q, killactive,
bind = SUPER, space, exec, pkill -USR1 quickshell || quickshell

# --- SCREENSHOTS ---
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy && wl-paste > ~/Pictures/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bind = SHIFT, Print, exec, grim - | wl-copy && wl-paste > ~/Pictures/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bind = CONTROL, Print, exec, grim -g "$(slurp -d)" - | wl-copy

# --- CLIPBOARD HISTORY ---
bind = SUPER, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# --- MEDIA KEYS ---
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindel = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindel = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# --- BRIGHTNESS ---
bindel = , XF86MonBrightnessUp, exec, brightnessctl s +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# --- SCREEN LOCK ---
bind = $mainMod CONTROL, l, exec, loginctl lock-session

# --- RELOAD HYPRLAND ---
bind = $mainMod SHIFT, R, exec, hyprctl reload

# --- KILL ACTIVE WINDOW ---
bind = $mainMod SHIFT, Q, killactive,

# --- EXIT HYPRLAND ---
bind = $mainMod CONTROL, q, exit,

# --- MOUSE ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
