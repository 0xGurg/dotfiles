# Hyprland App Routing
# Matches aerospace window rules from aerospace.toml

# --- WORKSPACE ASSIGNMENTS ---
# Ghostty → workspace 5 (same as aerospace)
windowrulev2 = workspace 5, class:(ghostty)

# Chat apps → workspace 2 (same as aerospace)
windowrulev2 = workspace 2, class:(slack|teams|whatsapp|discord|telegram)
windowrulev2 = workspace 2, title:(Slack|Teams|WhatsApp|Discord|Telegram)

# Design/Productivity → workspace 3 (same as aerospace)
windowrulev2 = workspace 3, class:(figma|outlook|miro|libreoffice)

# --- FLOATING WINDOWS ---
windowrulev2 = float, class:(pavucontrol|blueman-manager|org.gnome.Calculator|org.gnome.Loupe|xdg-desktop-portal)
windowrulev2 = float, title:(Picture-in-Picture|Save File|Open File|Library|File Upload|Save As|Authenticator)

# --- FLOAT + CENTER DIALOGS ---
windowrulev2 = center, class:.*, title:(Save As|Open File|File Upload|Authenticator)
windowrulev2 = float, class:.*, title:(Save As|Open File|File Upload|Authenticator)

# --- OPACITY ---
windowrulev2 = opacity 0.95 0.90, class:(ghostty)
windowrulev2 = opacity 0.95 0.90, class:(brave|firefox)
windowrulev2 = opacity 0.95 0.90, class:(Slack)

# --- SUPPRESS MAXIMIZE ---
windowrulev2 = suppressevent maximize, class:.*
