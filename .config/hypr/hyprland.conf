# Hyprland Config
# Matches aerospace muscle memory: Alt keybinds, 5 workspaces, kanagawa colors
# See: https://wiki.hyprland.org/Configuring/

# ---------------------------
# MONITOR
# ---------------------------
monitor=,preferred,auto,1

# ---------------------------
# EXEC STARTUP
# ---------------------------
exec-once = hyprpaper
exec-once = dunst
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --watch cliphist store

# ---------------------------
# ENVIRONMENT
# ---------------------------
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = GDK_BACKEND,wayland,x11
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = SDL_VIDEODRIVER,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1

# ---------------------------
# INPUT
# ---------------------------
input {
  kb_layout = us
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =

  follow_mouse = 1
  mouse_refocus = false

  touchpad {
    natural_scroll = true
    disable_while_typing = true
    tap-to-click = true
  }

  sensitivity = 0
}

# ---------------------------
# GENERAL
# ---------------------------
general {
  gaps_in = 5
  gaps_out = 10
  border_size = 2
  col.active_border = rgb(7A9CD8)
  col.inactive_border = rgb(363646)
  layout = dwindle
  cursor_inactive_timeout = 3
  allow_tearing = false
}

# ---------------------------
# DECORATION
# ---------------------------
decoration {
  rounding = 10
  blur {
    enabled = true
    size = 8
    passes = 3
    new_optimizations = on
    noise = 0.01
    contrast = 0.9
    brightness = 0.9
  }
  drop_shadow = true
  shadow_range = 12
  shadow_render_power = 3
  col.shadow = rgba(1F1F28ee)
}

# ---------------------------
# ANIMATIONS
# ---------------------------
animations {
  enabled = true
  bezier = wind, 0.05, 0.9, 0.1, 1.05
  bezier = winIn, 0.1, 1.0, 0.1, 1.0
  bezier = winOut, 0.0, 0.0, 0.5, 1.0
  bezier = slow, 0, 0.6, 0.1, 1.0
  animation = windows, 1, 6, wind, slide
  animation = windowsOut, 1, 6, slow, slide
  animation = fade, 1, 8, winIn
  animation = workspaces, 1, 6, wind
}

# ---------------------------
# DWINDLE
# ---------------------------
dwindle {
  pseudotile = true
  preserve_split = true
  smart_split = false
  smart_resizing = true
  special_scale_factor = 0.8
  no_gaps_when_only = true
  force_split = 2
}

# ---------------------------
# WINDOW RULES
# ---------------------------
windowrulev2 = workspace 5, class:(ghostty)
windowrulev2 = workspace 2, class:^(Slack|Teams|WhatsApp|Telegram|Discord)$
windowrulev2 = workspace 3, class:^(Figma|Outlook|Miro|LibreOffice)$
windowrulev2 = float, class:^(pavucontrol|blueman-manager|org.gnome.Calculator|org.gnome.Loupe|xdg-desktop-portal)
windowrulev2 = float, class:^(firefox|brave|chromium)$,title:^(Picture-in-Picture|Save File|Open File|Library)
windowrulev2 = float, title:^(Open File|Save As|File Upload|Authenticator)
windowrulev2 = center, class:.*, title:^(Save As|Open File|File Upload|Authenticator)
windowrulev2 = opacity 0.95 0.90, class:^(ghostty|brave|Slack)

# ---------------------------
# BLUR LS
# ---------------------------
plugin {
  splitn {
    col.vertex = rgba(7A9CD8ee)
    col.enable = 1
  }
}

# ---------------------------
# SOURCES
# ---------------------------
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/apps.conf
