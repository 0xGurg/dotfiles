add_newline = false
command_timeout = 500  # Reduced from 1000ms - skip slow modules if they take too long

format = """$directory$git_branch$git_status
$character"""
# Moved slow modules (nodejs, kubernetes) to right_format so they render async
right_format = """$cmd_duration"""

# Kanagawa Colors:
# crystalBlue: #7E9CD8  | springGreen: #98BB6C  | oniViolet: #957FB8
# roninYellow: #FF9E3B | samuraiRed: #E82424   | waveAqua2: #7AA89F
# surimiOrange: #FFA066 | sakuraPink: #D27E99  | carpYellow: #E6C384
# autumnGreen: #76946A | autumnRed: #C34043    | autumnYellow: #DCA561
# springBlue: #7FB4CA  | waveRed: #E46876      | fujiGray: #727169

[character]
success_symbol = '[❯](bold #98BB6C)'
error_symbol = '[❯](bold #E82424)'
vicmd_symbol = '[❮](bold #FF9E3B)'

[directory]
truncation_length = 3
truncate_to_repo = true  # Truncate to repo root (nicer looking)
style = 'bold #7E9CD8'
read_only = '[ 󰌾 ](#E46876)'

[git_branch]
format = '[ ](bold #957FB8)[$branch]($style)'
style = '#DCD7BA'
# Re-enabled - branch name is useful

[git_status]
format = '[$all_status$ahead_behind]($style)'
style = '#DCD7BA'
conflicted = '[ ](bold #E82424)'
ahead = '[ ⇡ ](bold #98BB6C)${count}'
behind = '[ ⇣ ](bold #FFA066)${count}'
diverged = '[ ⇕ ](bold #FF9E3B)⇡${ahead_count} ⇣${behind_count}'
untracked = '[  ](bold #7AA89F)${count}'
stashed = ''  # Disabled - stash check is slow
modified = '[  ](bold #DCA561)${count}'
staged = '[ 󰐗 ](bold #76946A)${count}'
deleted = '[ 󰍴 ](bold #C34043)${count}'
disabled = true  # Disabled due to SentinelOne causing ~300ms per git call. Use `git status` manually.

[nodejs]
format = '[  ](bold #98BB6C)[$version](#DCD7BA)'
detect_files = ['package.json', '.nvmrc']
detect_folders = []  # Don't scan for node_modules (slow!)
disabled = true  # Disable for faster prompt - you know your node version

[docker_context]
format = '[ 󰡨 ](bold #7FB4CA)[$context](#DCD7BA)'
disabled = true  # Disable - rarely needed in prompt

[kubernetes]
format = '[ 󱃾 ](bold #7FB4CA)[$context( \($namespace\))]($style)'
style = '#DCD7BA'
disabled = true  # Disable for faster prompt - kubectl config current-context is slow

[gcloud]
format = '[ 󱇶 ](bold #7E9CD8)[$account(@$domain)(\($region\))]($style)'
style = '#DCD7BA'
disabled = true  # Disable - gcloud calls are slow

[golang]
format = '[  ](bold #7AA89F)[$version](#DCD7BA)'
disabled = true  # Disable - version detection is slow

[helm]
format = '[ 󱃾 ](bold #7FB4CA)[$version](#DCD7BA)'

[cmd_duration]
min_time = 2000
format = '[  ](bold #FF9E3B)[$duration](#DCD7BA)'
show_notifications = false

# Disabled modules
[aws]
disabled = true

[terraform]
disabled = true

[vagrant]
disabled = true

[java]
disabled = true

[ruby]
disabled = true

[rust]
disabled = true

[python]
disabled = true

[php]
disabled = true
